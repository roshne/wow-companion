name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege — CI only needs to read the checked-out code.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npx vite build

  rust:
    name: Rust (fmt · clippy · check · test)
    # Windows-native app: keyring uses the windows-native backend and the
    # webview is WebView2, so we gate on the real target platform. This also
    # avoids installing the Linux webkit2gtk stack just to compile Tauri.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo check
      - run: cargo test
