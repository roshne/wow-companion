name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege — CI only needs to read the checked-out code.
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npx vite build

  rust:
    name: Rust (fmt · clippy · check · test)
    # Windows-native app: keyring uses the windows-native backend and the
    # webview is WebView2, so we gate on the real target platform. This also
    # avoids installing the Linux webkit2gtk stack just to compile Tauri.
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo check
      - run: cargo test

  rust-linux:
    name: Rust · Linux (fmt · clippy · check · test)
    # The Windows job above gates the shipping target; this job verifies the app also
    # compiles for Linux — chiefly the Linux-only keyring backend (Secret Service /
    # libdbus) that the Windows build never exercises.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      # webkitgtk (Tauri's webview) and libdbus-1 (keyring Secret Service backend) are
      # linked at build time, so they must be present for cargo check/clippy/test.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo check
      - run: cargo test
