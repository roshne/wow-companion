name: Build app

# Deliver a current wow-companion.exe on every push to main (and on demand).
# Download it from the run's "Artifacts" section. Signed installers + updater
# are a separate, later concern (M5); this is the raw executable only.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-exe:
    name: Windows exe
    runs-on: [self-hosted, windows]    # dev-box self-hosted runner (0 billed min)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # tauri build runs the frontend build (tsc + vite) then a release
      # cargo build; --no-bundle skips the MSI/NSIS installers.
      - run: npm run build:exe
      - uses: actions/upload-artifact@v4
        with:
          name: wow-companion-windows
          path: src-tauri/target/release/wow-companion.exe
          if-no-files-found: error

  linux-bin:
    name: Linux binary
    runs-on: [self-hosted, linux]      # NucBox G5 self-hosted runner (0 billed min)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Tauri's webview (webkitgtk) and keyring Secret Service backend (libdbus-1) are
      # linked at build time; they're pre-installed on the self-hosted runner (same dep
      # set as ci.yml's rust-linux job), so there's no apt step here.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Same build:exe script as Windows; on Linux --no-bundle skips the deb/AppImage
      # bundles and leaves the raw ELF binary (no .exe extension).
      - run: npm run build:exe
      - uses: actions/upload-artifact@v4
        with:
          name: wow-companion-linux
          path: src-tauri/target/release/wow-companion
          if-no-files-found: error
