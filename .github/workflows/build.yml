name: Build app

# Deliver a current wow-companion.exe on every push to main (and on demand).
# Download it from the run's "Artifacts" section. Signed installers + updater
# are a separate, later concern (M5); this is the raw executable only.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-exe:
    name: Windows exe
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # tauri build runs the frontend build (tsc + vite) then a release
      # cargo build; --no-bundle skips the MSI/NSIS installers.
      - run: npm run build:exe
      - uses: actions/upload-artifact@v7
        with:
          name: wow-companion-windows
          path: src-tauri/target/release/wow-companion.exe
          if-no-files-found: error

  linux-bin:
    name: Linux binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Tauri's webview (webkitgtk) and the keyring Secret Service backend (libdbus-1)
      # are system libraries the cargo build links against — install them first.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Same build:exe script as Windows; on Linux --no-bundle skips the deb/AppImage
      # bundles and leaves the raw ELF binary (no .exe extension).
      - run: npm run build:exe
      - uses: actions/upload-artifact@v7
        with:
          name: wow-companion-linux
          path: src-tauri/target/release/wow-companion
          if-no-files-found: error
