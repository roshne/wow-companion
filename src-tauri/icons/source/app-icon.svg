<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>WoW Companion app icon</title>
  <defs>
    <!-- Brand-blue tile gradient (matches the app accent token, light to dark). -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b8bff" />
      <stop offset="1" stop-color="#2a54c0" />
    </linearGradient>
    <!-- Soft top sheen for a subtle glossy tile. -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- Gold sparkle accent. -->
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd766" />
      <stop offset="1" stop-color="#f6a81e" />
    </linearGradient>
  </defs>

  <!-- Rounded-square tile with a small transparent margin. -->
  <rect x="64" y="64" width="896" height="896" rx="196" fill="url(#tile)" />
  <rect x="64" y="64" width="896" height="896" rx="196" fill="url(#gloss)" />

  <!-- Subtle depth: a darker-blue W offset beneath the white one. -->
  <polyline
    points="288,366 410,658 512,496 614,658 736,366"
    fill="none"
    stroke="#1f3f9e"
    stroke-opacity="0.22"
    stroke-width="104"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- The W monogram: one stroked polyline, rounded joins (crisp down to 16px). -->
  <polyline
    points="288,356 410,648 512,486 614,648 736,356"
    fill="none"
    stroke="#ffffff"
    stroke-width="104"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Gold sparkle accent in the open upper-right of the W. -->
  <path
    d="M616,300 L630,338 L668,352 L630,366 L616,404 L602,366 L564,352 L602,338 Z"
    fill="url(#spark)"
  />
</svg>
